<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        header{
            width: 100%;
            height: 50px;
            background: linear-gradient(red, white, red)
        }
        header nav h3{
            display: inline-block;
            padding: 5px 50px;
            font-size: 30px;
            color: rgb(96, 95, 96);
        }
        ul{
            float: right;
            margin-right: 40px;
        }
        ul li{
            display: inline-block;
            padding: 13px;
        }
        ul li a{
            position: relative;
            text-decoration: none;
            font-weight: bold;
            font-size: 17px;
            color: blueviolet;
        }
        ul li a::after{
            content: "";
            width: 100%;
            height: 5px;
            background: linear-gradient(to right, violet, blue, green);
            border-radius: 50px;
            position: absolute;
            top: 32px;
            right: 0;
            transition: 1s;
            transform: scaleX(0);
            transition-delay: 0.5s;
            transform-origin: left;
        }
        ul li a:hover::after{
            transform: scaleX(1.1);
        }
        button{
            margin-left: 50px;
            padding: 5px 15px;
            border-radius: 5px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover{
            color: white;
            background-color: #000;
            /* padding: 5px 20px; */
            transform: scaleX(1.1);
            transition-duration: 0.5s;
            transform-origin: left;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <h3>Logo</h3>
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Services</a></li>
                <li><a href="">Contact Us</a></li>
                <button type="submit">Sign In</button>
            </ul>
        </nav>
    </header>
</body>
</html>
