<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            height: 400px;
            background-color: aquamarine;
            position: relative;
        }
        .box1{
            width: 200px;
            height: 200px;
            border: 2px solid aqua;
            border-radius: 10px;
            background-color: antiquewhite;
            margin: 20px;
            display: inline-block;
        }
        .container :nth-child(2){
            position: relative;
            top: 50px;
            /* left: 50px; */
        }
        .container :nth-child(4){
            position: absolute;
            top: 50px;
            right: 30px;
        }

        h1{
            text-align: center;
            line-height: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1">
            <h1>box 1</h1>
        </div>
        <div class="box1">
            <h1>box 2</h1>
            
        </div>
        <div class="box1">
            <h1>box 3</h1>
            
        </div>
        <div class="box1">
            <h1>box 4</h1>
            
        </div>
        <div class="box1">

            <h1>box 5</h1>
        </div>
    </div>
</body>
</html>
