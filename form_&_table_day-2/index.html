<!doctype html>
<html lang="en">
  <head>
    <title>Job Application Form</title>
  </head>
  <body>
    <center>
      <table frame="border" rules="all" width="450">
        <caption>
          <h1>Job Application form</h1>
        </caption>
        <form>
          <tr height="40">
            <td>Full Name:</td>
            <td>
              <input type="text" placeholder="Enter your name" required />
            </td>
          </tr>
          <tr height="40">
            <td>Email Address:</td>
            <td><input type="email" name="email" required /></td>
          </tr>
          <tr height="40">
            <td>Phone Number:</td>
            <td><input type="number" placeholder="123-456-7890" required/></td>
          </tr>
          <tr height="40">
            <td>Gender:</td>
            <td>
              <input type="radio" required />Male
              <input type="radio" required />Female
            </td>
          </tr>
          <tr height="40">
            <td>Job Role:</td>
            <td>
              <select>
                <option selected>--Select Role--</option>
                <option value="">Technical</option>
                <option value="">Leadership & Managerial</option>
                <option value="">Customer-Facing & Sales</option>
                <option value="">Marketing</option>
                <option value="">Administrative</option>
                <option value="">Financial</option>
              </select>
            </td>
          </tr>
          <tr height="40">
            <td>Date of Birth:</td>
            <td>
              <input type="date" />
            </td>
          </tr>
          <tr height="40">
            <td>Favorite Color:</td>
            <td>
              <input type="color" />
            </td>
          </tr>
          <tr height="40">
            <td>Uplode Resume:</td>
            <td>
              <input type="file" required/>
            </td>
          </tr>
          <tr height="40">
            <td>Skills:</td>
            <td>
              <input type="checkbox" /> HTML <input type="checkbox" /> CSS
              <input type="checkbox" /> JavaScript
              <input type="checkbox" /> React
            </td>
          </tr>
          <tr height="100">
            <td>Cover Letter:</td>
            <td>
              <textarea
                name="textarea"
                placeholder="Write Something About Yourself...." cols="35" rows="5" required
              ></textarea>
            </td>
          </tr>
          <tr align="center" height="40">
            <td colspan="2">
              <button type="submit">Submit</button>
              <button type="reset">Reset</button>
            </td>
          </tr>
        </form>
      </table>
    </center>
  </body>
</html>
