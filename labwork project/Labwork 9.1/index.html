<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background image or color gradient</title>
    <link rel="stylesheet" href="css/style.css" type="text/css">

</head>

<body>
    <section class="box">
        <header class="head">
            <nav>
                <p>Welcome to the Parallax World</p>
            </nav>
        </header>
    </section>
    <section class="linear"></section>
    <section class="radial"></section>
    <section class="conic"></section>
    <footer>
        <p class="content">This block uses to classes <strong>text-block</strong> and <strong>highlight</strong>.</p>
        <div class="foot">
            <h3>Parent Box Heading</h3>
            <p>This paragraph is a  child element styled inside the parent.</p>
        </div>
    </footer>
</body>

</html>
